name: Quick Test

on:
  push:
    branches: [ main, dev ]
    paths-ignore: [ "docs/**", "**/*.md" ]
  pull_request:
    branches: [ main ]
    paths-ignore: [ "docs/**", "**/*.md" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quick-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linting-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install lint tool
        run: |
          python -m pip install --upgrade pip
          pip install black
      - name: Format check
        run: black --check .

  quick-test-no-gui:
    needs: linting-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install .[dev] pytest
      - name: Tests (quick, no GUI)
        run: pytest -q -m "not gui"

  quick-test-gui:
    needs: linting-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (GUI)
        run: |
          python -m pip install --upgrade pip
          pip install .[dev,gui] pytest
      - name: Tests (quick, GUI)
        run: pytest -q -m "gui"
