name: Cross-Platform Full Matrix

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-matrix-test:
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install .[dev] pytest
      - name: Run tests (no coverage)
        run: pytest -q -m "not gui"

  gui-test:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        python-version: ["3.12", "3.14"]
    runs-on: ${{ matrix.os }}
    name: GUI ${{ matrix.os }} / py${{ matrix.python-version }}
    env:
      BELLATREX_GUI_AUTO_CLOSE_SECONDS: "2"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install .[dev] pytest
      - name: Run GUI tests
        run: pytest -q -m "gui"
