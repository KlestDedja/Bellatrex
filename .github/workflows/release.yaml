name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Stable release tag (vX.Y.Z)"
        required: true
        type: string

permissions:
  contents: read
  actions: read

env:
  PACKAGE_NAME: bellatrex
  OWNER: klestdedja

jobs:
  details:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.release.outputs.new_version }}
      suffix: ${{ steps.release.outputs.suffix }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      tag_sha: ${{ steps.release.outputs.tag_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract tag and Details
        id: release
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${{ github.event.inputs.tag }}"
          TAG_NAME="${TAG_NAME#refs/tags/}"

          # Stable release tags only: vX.Y.Z
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid stable release tag '$TAG_NAME'. Use format vX.Y.Z (no dev/a/rc)."
            exit 1
          fi

          if ! git rev-parse -q --verify "refs/tags/${TAG_NAME}" >/dev/null; then
            echo "Tag '${TAG_NAME}' does not exist in repository."
            exit 1
          fi

          TAG_SHA=$(git rev-list -n 1 "${TAG_NAME}")
          NEW_VERSION="${TAG_NAME#v}"
          SUFFIX=""

          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "suffix=${SUFFIX}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag_sha=${TAG_SHA}" >> "$GITHUB_OUTPUT"
          echo "Version is ${NEW_VERSION}"
          echo "Tag name is ${TAG_NAME}"
          echo "Tag SHA is ${TAG_SHA}"

  verify_matrix:
    needs: details
    runs-on: ubuntu-latest
    steps:
      - name: Require successful ci-matrix run for tag commit
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ needs.details.outputs.tag_sha }}
          WORKFLOW_FILE: ci-matrix.yaml
        shell: bash
        run: |
          set -euo pipefail

          run_json=$(gh api "repos/${REPO}/actions/workflows/${WORKFLOW_FILE}/runs?event=push&head_sha=${SHA}&status=completed&per_page=20")
          run_id=$(echo "$run_json" | jq -r '.workflow_runs[0].id // empty')
          conclusion=$(echo "$run_json" | jq -r '.workflow_runs[0].conclusion // empty')

          if [ -z "$run_id" ]; then
            echo "No completed ci-matrix run found for commit ${SHA}."
            echo "Run ci-matrix first (on the tag push) and retry this manual release."
            exit 1
          fi

          if [ "$conclusion" != "success" ]; then
            echo "ci-matrix run ${run_id} is completed with conclusion=${conclusion}."
            echo "Release is blocked until ci-matrix succeeds."
            exit 1
          fi

          echo "ci-matrix run ${run_id} succeeded for commit ${SHA}."

  check_pypi:
    needs: [details, verify_matrix]
    runs-on: ubuntu-latest
    steps:
      - name: Fetch information from PyPI
        run: |
          response=$(curl -s https://pypi.org/pypi/${{ env.PACKAGE_NAME }}/json || echo "{}")
          latest_previous_version=$(echo $response | jq --raw-output "select(.releases != null) | .releases | keys_unsorted | last")
          if [ -z "$latest_previous_version" ]; then
            echo "Package not found on PyPI."
            latest_previous_version="0.0.0"
          fi
          echo "Latest version on PyPI: $latest_previous_version"
          echo "latest_previous_version=$latest_previous_version" >> $GITHUB_ENV

      - name: Compare versions and exit if not newer
        run: |
          NEW_VERSION=${{ needs.details.outputs.new_version }}
          LATEST_VERSION=$latest_previous_version
          if [ "$(printf '%s\n' "$LATEST_VERSION" "$NEW_VERSION" | sort -rV | head -n 1)" != "$NEW_VERSION" ] || [ "$NEW_VERSION" == "$LATEST_VERSION" ]; then
            echo "The new version $NEW_VERSION is not greater than the latest version $LATEST_VERSION on PyPI."
            exit 1
          else
            echo "The new version $NEW_VERSION is greater than the latest version $LATEST_VERSION on PyPI."
          fi

  setup_and_build:
    needs: [details, check_pypi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.details.outputs.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Python and build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Install package and build distributions
        run: |
          # Install project (and dev extras if present) so build dependencies are available
          pip install -e ".[dev]" || true
          # Build sdist and wheel into ./dist
          python -m build --sdist --wheel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi_publish:
    name: Upload release to PyPI
    needs: [setup_and_build, details]
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github_release:
    name: Create GitHub Release
    needs: [setup_and_build, details]
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.details.outputs.tag_name }}
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        id: create_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ needs.details.outputs.tag_name }} dist/* --title ${{ needs.details.outputs.tag_name }} --generate-notes
